{% extends "base.html" %}
{% block title %}Iniciar Sesión{% endblock %}
{% block content %}
<div class="card" style="max-width: 450px; margin: 0 auto;">
    <h1>Bienvenido</h1>
    <p class="subtitle">Ingresa tus credenciales para acceder a tu cuenta</p>
    
    {% if error %}
        <div class="alert alert-error">{{ error }}</div>
    {% endif %}
    
    <form method="post" id="loginForm">
        {% csrf_token %}
        <div class="form-group">
            <label for="email">Correo electrónico</label>
            <input type="email" id="email" name="email" placeholder="usuario@ejemplo.com" required autofocus>
        </div>
        <div class="form-group">
            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-primary" style="width:100%; padding:0.75rem; font-size:1rem;">
            Iniciar sesión
        </button>
    </form>
    <div class="text-center text-sm text-muted mt-2">
        Usuarios de prueba: MarcoSolis@gmail.com / 123456
    </div>
</div>
{% endblock %}
