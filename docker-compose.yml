services:
  db:
    image: mysql:8
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  api:
    build: ./api
    container_name: api_service
    restart: always
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: app_db
      JWT_SECRET: mi-secreto-super-seguro   # NUEVO
    volumes:
      - uploads_data:/app/uploads            # NUEVO: persistir archivos subidos
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/catalogo"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build: ./web
    container_name: django_web
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
  uploads_data:   # NUEVO